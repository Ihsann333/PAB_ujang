name: kostly_pa
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  supabase_flutter: ^2.0.0
  intl: ^0.19.0
  google_fonts: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

# Konfigurasi Icon Aplikasi (Sudah Benar)
flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/login_logo_kostly.jpeg" 
  adaptive_icon_background: "#F2E8DA"
  adaptive_icon_foreground: "assets/images/login_logo_kostly.jpeg"

# BAGIAN INI YANG KURANG:
flutter:
  uses-material-design: true
  assets:
    - assets/images/login_logo_kostly.jpeg